name: Corregir favicon de Inicio

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/corregir-favicon.yml'

permissions:
  contents: write

jobs:
  corregir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Corregir ruta del favicon
        run: |
          sed -i 's#https://crebe-ucayali.github.io/accesos-complementarios/logo-crebe.png#https://crebe-ucayali.github.io/banco-digital-accesible/logo-crebe.png#g' index.html
          git rm .github/workflows/corregir-favicon.yml
      - name: Guardar cambios
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Corregir ruta del favicon principal'
          git push
