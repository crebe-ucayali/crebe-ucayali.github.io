name: Completar retiro de JIA y LI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/retirar-jia-li.yml'

permissions:
  contents: write

jobs:
  actualizar-portada:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Limpiar referencias residuales
        run: |
          python - <<'PY'
          from pathlib import Path
          import json, re

          index_path = Path('index.html')
          html = index_path.read_text(encoding='utf-8')
          html = html.replace('Ejemplo: materiales, juegos, braille, noticias', 'Ejemplo: materiales, braille, noticias, contacto')
          html = re.sub(r'\s*<button type="button" class="sugerencia-busqueda" data-consulta="juegos">juegos</button>', '', html)
          index_path.write_text(html, encoding='utf-8')

          busqueda_path = Path('busqueda.json')
          datos = json.loads(busqueda_path.read_text(encoding='utf-8'))
          datos = [item for item in datos if item.get('modulo') not in {'JIA', 'LI'}]
          busqueda_path.write_text(json.dumps(datos, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          main_path = Path('main.js')
          js = main_path.read_text(encoding='utf-8')
          js = js.replace('materiales, juegos, braille, señas, noticias o contacto', 'materiales, braille, señas, noticias o contacto')
          main_path.write_text(js, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html busqueda.json main.js
          git commit -m "Completar retiro de referencias a JIA y LI"
          git push
